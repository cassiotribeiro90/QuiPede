name: quipede
description: "QuiPede"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dio: ^5.5.0+1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  get_it: ^7.7.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  json_annotation: ^4.9.0
  permission_handler: ^11.3.1
  geolocator: ^13.0.1
  # Login Social
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1
  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mockito: ^5.4.4
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  hive_test: ^1.0.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "lib/app/assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/app/assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - lib/app/assets/data/
